server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static file/image server
    location /static/ {
        alias /usr/share/nginx/static/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        
        # Allow common file types
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|pdf|doc|docx|txt|csv|zip|rar)$ {
            add_header Content-Disposition "inline";
        }
    }

    location /api/ {
        proxy_pass ${VITE_BACKEND_URL};
        proxy_http_version 1.1;
        
        # SSE Specific Headers
        proxy_set_header Connection "";
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header X-Accel-Buffering "no"; # Disables NGINX buffering for this stream
        
        # Standard Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Performance & Timeouts
        proxy_buffering off;         # Essential for streaming
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 24h;      # Keeps the event stream alive longer
        proxy_send_timeout 24h;      # Prevents timeout during quiet periods
        
        # Optional: ensure the chunked transfer encoding is handled
        chunked_transfer_encoding on;
    }

    # Handle SPA routing - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
