services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-th-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot-th
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatbot-th"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  api:
    build:
      context: ./api
    container_name: chatbot-th-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RAG_DATABASE_URL: postgres://postgres:postgres@postgres:5432/chatbot-th
    ports:
      - "4401:3000"
    volumes:
      - ./api/config:/app/config:ro
    networks:
      - default

  web:
    build:
      context: ./web
      args:
        VITE_BACKEND_URL: http://api:3000
        VITE_DOCUMENT_FILE_URL_TEMPLATE: http://api:3000/api/v1/documents/{documentId}/file
    environment:
      - VITE_BACKEND_URL=http://api:3000
    container_name: chatbot-th-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "4400:80"
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    name: chatbot-th-network
    driver: bridge
